<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error & UI Templates - Quick Copy</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      line-height: 1.6;
    }
    h1 { color: #58a6ff; text-align: center; margin-bottom: 1.5em; }
    h2 { color: #ff8787; text-align: center; margin: 2em 0 1em; }
    .divider { height: 2px; background: #30363d; margin: 2.5em 0 1.5em; }
    .container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
    }
    .item {
      margin: 1.2em 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    input[type="checkbox"] {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: #f78166;
    }
    label {
      flex: 1;
      cursor: pointer;
      user-select: none;
    }
    .major label { color: #ff6b6b; font-weight: 600; }
    .minor label { color: #f78166; font-weight: 500; }
    .ui label { color: #79c0ff; }
    .copy-btn {
      background: #444d56;
      color: #e6edf3;
      border: none;
      padding: 6px 12px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.9rem;
      min-width: 60px;
    }
    .copy-btn:hover { background: #586069; }
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #238636;
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1000;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>Error & UI Templates - Click to Copy</h1>

<div class="container">

  <h2>Major Errors</h2>
  <div class="item">
    <input type="checkbox" id="maj1">
    <label for="maj1" onclick="copyText('Major error: Incorrect transcription - meaning changed')">Major error: Incorrect transcription - meaning changed</label>
  </div>
  <div class="item">
    <input type="checkbox" id="maj2">
    <label for="maj2" onclick="copyText('Major error: Missing or incorrect use of square bracket tags')">Major error: Missing or incorrect use of square bracket tags</label>
  </div>
  <div class="item">
    <input type="checkbox" id="maj3">
    <label for="maj3" onclick="copyText('Major error: Transcribing any AI/assistant speech')">Major error: Transcribing any AI/assistant speech</label>
  </div>

  <div class="divider"></div>

  <h2>Minor Errors</h2>
  <div class="item">
    <input type="checkbox" id="min1">
    <label for="min1" onclick="copyText('Minor Error: Incorrect Transcription - (meaning unchanged)')">Minor Error: Incorrect Transcription - (meaning unchanged)</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min2">
    <label for="min2" onclick="copyText('Minor Error: Failure to separate multiple speakers properly')">Minor Error: Failure to separate multiple speakers properly</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min3">
    <label for="min3" onclick="copyText('Minor Error: Consecutive [unclear] tags or mistyped tagging')">Minor Error: Consecutive [unclear] tags or mistyped tagging</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min4">
    <label for="min4" onclick="copyText('Minor Error: Punctuation Issues')">Minor Error: Punctuation Issues</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min5">
    <label for="min5" onclick="copyText('Minor Error: Incorrect Language Selection')">Minor Error: Incorrect Language Selection</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min6">
    <label for="min6" onclick="copyText('Minor Error: Spacing Issues')">Minor Error: Spacing Issues</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min7">
    <label for="min7" onclick="copyText('Minor Error: Objective Issue with UI Question')">Minor Error: Objective Issue with UI Question</label>
  </div>

  <div class="divider"></div>

  <h2>UI Correction Templates</h2>
  <div class="item">
    <input type="checkbox" id="ui1">
    <label for="ui1" onclick="copyText('dominant language changed to primary from another')">dominant language changed to primary from another</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui2">
    <label for="ui2" onclick="copyText('dominant language changed to en from another')">dominant language changed to en from another</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui3">
    <label for="ui3" onclick="copyText('dominant language changed to en from primary')">dominant language changed to en from primary</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui4">
    <label for="ui4" onclick="copyText('changed to \"not interrupted\" from N/A')">changed to "not interrupted" from N/A</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui5">
    <label for="ui5" onclick="copyText('changed to \"not interrupted\" from not sure')">changed to "not interrupted" from not sure</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui6">
    <label for="ui6" onclick="copyText('changed to N/A from \"not interrupted\"')">changed to N/A from "not interrupted"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui7">
    <label for="ui7" onclick="copyText('changed model interruption to \"not sure\" from “not interrupted”')">changed model interruption to "not sure" from “not interrupted”</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui8">
    <label for="ui8" onclick="copyText('changed model interruption to \"interrupted\" - intentional')">changed model interruption to "interrupted" - intentional</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui9">
    <label for="ui9" onclick="copyText('changed model interruption from \"not interrupted\" to \"interrupted\" - not intentional')">changed model interruption from "not interrupted" to "interrupted - not intentional"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui10">
    <label for="ui10" onclick="copyText('DDA changed to \"Yes\"')">DDA changed to "Yes"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui11">
    <label for="ui11" onclick="copyText('DDT updated')">DDT updated</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui12">
    <label for="ui12" onclick="copyText('DDA changed to \"No\"')">DDA changed to "No"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui13">
    <label for="ui13" onclick="copyText('changed user done talking to “Not sure” from \"No\"')">changed user done talking to “Not sure” from "No"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui14">
    <label for="ui14" onclick="copyText('changed user done talking to “Yes” from \"no\"')">changed user done talking to “Yes” from "no"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui15">
    <label for="ui15" onclick="copyText('changed user done talking to “not sure” from \"interrupted- user intended\"')">changed user done talking to “not sure” from "interrupted- user intended"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui16">
    <label for="ui16" onclick="copyText('changed - model interruption - \"N/A\" - first turn')">changed - model interruption - "N/A" - first turn</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui17">
    <label for="ui17" onclick="copyText('changed - model interruption from \"N/A\" to \"not interrupted\" as a response of model available for turn prior to first turn')">changed - model interruption from "N/A" to "not interrupted" as a response of model available for turn prior to first turn</label>
  </div>

</div>

<div id="toast">Copied to clipboard</div>

<script>
function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = "Copied!";
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {
    alert('Failed to copy');
  });
}
</script>

</body>
</html>
