<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Error & UI Templates - Quick Copy</title>
  <style>
    :root {
      --font-size: 16px;
    }
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 20px;
      min-height: 100vh;
      line-height: 1.6;
      font-size: var(--font-size);
    }
    h1 { color: #58a6ff; text-align: center; margin-bottom: 1.5em; }
    h2 { 
      text-align: center; 
      margin: 2em 0 1em; 
      padding: 8px 16px; 
      border-radius: 8px; 
    }
    h2.major { background: #2d1a1a; color: #ff6b6b; }
    h2.minor { background: #2d251a; color: #f78166; }
    h2.ui { background: #1a2d3a; color: #79c0ff; }
    h2.note { background: #1a2d1f; color: #7ed957; }
    .container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 24px;
      max-width: 800px;
      margin: 0 auto;
      position: relative;
    }
    .top-bar {
      position: fixed;
      top: 16px;
      right: 16px;
      z-index: 10;
      display: flex;
      gap: 12px;
      align-items: center;
    }
    .action-btn {
      background: #444d56;
      color: #e6edf3;
      border: none;
      width: 36px;
      height: 36px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 1.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:hover { background: #586069; }
    .reload-btn { background: #586069; }
    .reload-btn:hover { background: #6b7280; }
    .item {
      margin: 1.2em 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    input[type="checkbox"] {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: #f78166;
    }
    label {
      flex: 1;
      cursor: pointer;
      user-select: none;
    }
    .major label { color: #ff6b6b; font-weight: 600; }
    .minor label { color: #f78166; font-weight: 500; }
    .ui label { color: #79c0ff; }
    #toast {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      background: #238636;
      color: white;
      padding: 10px 24px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1000;
    }
    #toast.show { opacity: 1; }
  </style>
</head>
<body>

<h1>Error & UI Templates - Click to Copy</h1>

<div class="container">

  <div class="top-bar">
    <button class="action-btn reload-btn" onclick="resetAll()" title="Reset checkboxes">↻</button>
    <button class="zoom-btn" onclick="zoom(-2)">−</button>
    <button class="zoom-btn" onclick="zoom(2)">+</button>
    <button class="action-btn" onclick="copyChecked()" title="Copy checked">📋</button>
  </div>

  <h2 class="major">Major Errors</h2>
  <div class="item">
    <input type="checkbox" id="maj1">
    <label for="maj1">Major error: Incorrect transcription - meaning changed</label>
  </div>
  <div class="item">
    <input type="checkbox" id="maj2">
    <label for="maj2">Major error: Missing or incorrect use of square bracket tags</label>
  </div>
  <div class="item">
    <input type="checkbox" id="maj3">
    <label for="maj3">Major error: Transcribing any AI/assistant speech</label>
  </div>

  <div class="divider"></div>

  <h2 class="minor">Minor Errors</h2>
  <div class="item">
    <input type="checkbox" id="min1">
    <label for="min1">Minor Error: Incorrect Transcription - (meaning unchanged)</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min2">
    <label for="min2">Minor Error: Failure to separate multiple speakers properly</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min3">
    <label for="min3">Minor Error: Consecutive [unclear] tags or mistyped tagging</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min4">
    <label for="min4">Minor Error: Punctuation Issues</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min5">
    <label for="min5">Minor Error: Incorrect Language Selection</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min6">
    <label for="min6">Minor Error: Spacing Issues</label>
  </div>
  <div class="item">
    <input type="checkbox" id="min7">
    <label for="min7">Minor Error: Objective Issue with UI Question</label>
  </div>

  <div class="divider"></div>

  <h2 class="ui">UI Correction Templates</h2>
  <div class="item">
    <input type="checkbox" id="ui1">
    <label for="ui1">dominant language changed to primary from another</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui2">
    <label for="ui2">dominant language changed to en from another</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui3">
    <label for="ui3">dominant language changed to en from primary</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui4">
    <label for="ui4">changed to "not interrupted" from N/A</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui5">
    <label for="ui5">changed to "not interrupted" from not sure</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui6">
    <label for="ui6">changed to N/A from "not interrupted"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui7">
    <label for="ui7">changed model interruption to "not sure" from “not interrupted”</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui8">
    <label for="ui8">changed model interruption to "interrupted intentional"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui9">
    <label for="ui9">changed model interruption from "not interrupted" to "interrupted - not intentional"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui10">
    <label for="ui10">DDA changed to "Yes"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui11">
    <label for="ui11">DDT updated</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui12">
    <label for="ui12">DDA changed to "No"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui13">
    <label for="ui13">changed user done talking to “Not sure” from "No"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui14">
    <label for="ui14">changed user done talking to “Yes” from "no"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui15">
    <label for="ui15">changed user done talking to “not sure” from "interrupted- user intended"</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui16">
    <label for="ui16">changed - model interruption - "N/A" - first turn</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui17">
    <label for="ui17">changed - model interruption from "N/A" to "not interrupted" as a response of model available for turn prior to first turn</label>
  </div>
  <div class="item">
    <input type="checkbox" id="ui18">
    <label for="ui18">changed speakers from 1 to 2</label>
  </div>

  <div class="divider"></div>

  <h2>Note for L0</h2>
  <div class="item">
    <input type="checkbox" id="n1">
    <label for="n1">listen carefully and capture the exact words spoken by the user without changing the meaning.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n2">
    <label for="n2">use square bracket tags correctly like [unclear], [noise], [laughter] when required.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n3">
    <label for="n3">do not transcribe any AI or assistant speech, only the user should be transcribed.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n4">
    <label for="n4">ensure clear separation of multiple speakers using proper speaker numbering like (1), (2).</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n5">
    <label for="n5">avoid repeating or mistyping tags such as consecutive [unclear] tags.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n6">
    <label for="n6">ensure each segment ends with proper punctuation.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n7">
    <label for="n7">select the correct language based on the speech in the audio.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n8">
    <label for="n8">maintain proper spacing between words and punctuation.</label>
  </div>
  <div class="item">
    <input type="checkbox" id="n9">
    <label for="n9">carefully review UI selections and answer objective questions accurately.</label>
  </div>

</div>

<div id="toast">Copied to clipboard</div>

<script>
function zoom(delta) {
  let size = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--font-size')) || 16;
  size += delta;
  document.documentElement.style.setProperty('--font-size', size + 'px');
}

function copyText(text) {
  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = "Copied!";
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 1800);
  }).catch(() => {
    alert('Failed to copy');
  });
}

function copyChecked() {
  const checked = document.querySelectorAll('input[type="checkbox"]:checked');
  if (checked.length === 0) return;

  let text = "";
  checked.forEach(cb => {
    const label = cb.nextElementSibling.textContent.trim();
    text += label + "\n";
  });

  navigator.clipboard.writeText(text.trim()).then(() => {
    const toast = document.getElementById('toast');
    toast.textContent = "All checked copied!";
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2000);
  }).catch(() => alert('Copy failed'));
}

function resetAll() {
  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
}
</script>

</body>
</html>
