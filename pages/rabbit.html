<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QA Error Checklist - 20 Turns</title>
  <style>
    :root {
      --checklist-font-size: 15px;
    }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      margin: 0;
      padding: 12px;
      min-height: 100vh;
      line-height: 1.45;
      font-size: var(--checklist-font-size);
    }
    h1 {
      color: #58a6ff;
      text-align: center;
      font-size: 1.35rem;
      margin: 0 0 12px;
    }
    .container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 10px;
      padding: 14px;
      max-width: 100%;
    }
    .top-row {
      display: flex;
      flex-direction: column;
      gap: 10px;
      margin-bottom: 14px;
    }
    #turnSelect, #timestampInput {
      padding: 10px 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 8px;
      font-size: 0.95rem;
    }
    .error-item {
      margin: 8px 0;
      display: flex;
      align-items: flex-start;
      gap: 10px;
    }
    .error-item input[type="checkbox"] {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: #f78166;
      flex-shrink: 0;
    }
    .error-item label {
      flex: 1;
      cursor: pointer;
      word-wrap: break-word;
      hyphens: auto;
    }
    .number {
      font-weight: bold;
      color: #79c0ff;
      min-width: 20px;
    }
    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: center;
      margin: 16px 0;
    }
    button {
      padding: 10px 20px;
      font-size: 0.95rem;
      border-radius: 8px;
      cursor: pointer;
      border: none;
      min-width: 110px;
      touch-action: manipulation;
    }
    .main-btn { background: #238636; color: white; }
    .main-btn:active { background: #2ea043; }
    .reset { background: #c94d4d; color: white; }
    .reset:active { background: #e06666; }
    .font-btn {
      background: #444d56;
      color: #e6edf3;
      min-width: 40px;
      padding: 10px;
      font-weight: bold;
    }
    .font-btn:active { background: #586069; }
    #result-container {
      margin-top: 16px;
      position: relative;
      display: none;
    }
    #result {
      padding: 12px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 8px;
      white-space: pre-wrap;
      font-family: 'Consolas', monospace;
      max-height: 50vh;
      overflow-y: auto;
      line-height: 1.45;
      font-size: 0.88rem;
      word-break: break-all;
    }
    #copy-all-btn {
      position: absolute;
      bottom: 10px;
      right: 10px;
      background: #444d56;
      color: #e6edf3;
      border: 1px solid #586069;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 0.85rem;
      cursor: pointer;
    }
    #copy-all-btn:active { background: #586069; color: white; }
    #toast {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #2ea043;
      color: white;
      padding: 8px 20px;
      border-radius: 8px;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1000;
      font-size: 0.9rem;
    }
    #toast.show { opacity: 1; }
    footer {
      text-align: center;
      margin-top: 24px;
      color: #8b949e;
      font-size: 0.8rem;
    }
    @media (min-width: 420px) {
      .top-row { flex-direction: row; }
      body { padding: 16px; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>

<h1>QA Error Checklist - 20 Turns</h1>

<div class="container">

  <div class="top-row">
    <select id="turnSelect">
      <option value="">Select Turn</option>
      <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
      <option value="T4">T4</option><option value="T5">T5</option><option value="T6">T6</option>
      <option value="T7">T7</option><option value="T8">T8</option><option value="T9">T9</option>
      <option value="T10">T10</option><option value="T11">T11</option><option value="T12">T12</option>
      <option value="T13">T13</option><option value="T14">T14</option><option value="T15">T15</option>
      <option value="T16">T16</option><option value="T17">T17</option><option value="T18">T18</option>
      <option value="T19">T19</option><option value="T20">T20</option>
    </select>

    <input type="text" id="timestampInput" placeholder="timestamp" />
  </div>

  <div class="error-item"><input type="checkbox" id="e1" value="1"><label for="e1"><span class="number">1</span> Minor Error – Incorrect Transcription (meaning unchanged)</label></div>
  <div class="error-item"><input type="checkbox" id="e2" value="2"><label for="e2"><span class="number">2</span> Failure to separate multiple speakers properly</label></div>
  <div class="error-item"><input type="checkbox" id="e3" value="3"><label for="e3"><span class="number">3</span> Consecutive [unclear] tags or mistyped tagging</label></div>
  <div class="error-item"><input type="checkbox" id="e4" value="4"><label for="e4"><span class="number">4</span> Punctuation Issues</label></div>
  <div class="error-item"><input type="checkbox" id="e5" value="5"><label for="e5"><span class="number">5</span> Incorrect Language Selection</label></div>
  <div class="error-item"><input type="checkbox" id="e6" value="6"><label for="e6"><span class="number">6</span> Spacing Issues</label></div>
  <div class="error-item"><input type="checkbox" id="e7" value="7"><label for="e7"><span class="number">7</span> Objective Issue with UI Question</label></div>

  <div class="btn-row">
    <button class="main-btn" onclick="addErrorsForTurn()">Add </button>
    <button class="reset" onclick="resetAll()">Reset</button>
    <button class="font-btn" onclick="changeFontSize(1)">A+</button>
    <button class="font-btn" onclick="changeFontSize(-1)">A–</button>
  </div>

  <div id="result-container">
    <button id="copy-all-btn" onclick="copyAll()">Copy All</button>
    <div id="result"></div>
  </div>

</div>

<div id="toast">All errors copied</div>

<script>
const shortNames = {
  '1': 'Minor transcription error (meaning unchanged)',
  '2': 'Multiple speakers not separated properly',
  '3': 'Consecutive/mistyped [unclear] tags',
  '4': 'Punctuation issues',
  '5': 'Incorrect language selection',
  '6': 'Spacing issues',
  '7': 'Objective UI question issue'
};

let allErrors = [];

// Only checklist text size (no limit)
function changeFontSize(delta) {
  let size = parseInt(getComputedStyle(document.documentElement).getPropertyValue('--checklist-font-size')) || 15;
  size += delta;
  document.documentElement.style.setProperty('--checklist-font-size', size + 'px');
}

function addErrorsForTurn() {
  const turn = document.getElementById('turnSelect').value.trim();
  const ts   = document.getElementById('timestampInput').value.trim();

  if (!turn) return alert("Select turn");
  if (!ts)   return alert("Enter timestamp");

  const checked = document.querySelectorAll('input[type="checkbox"]:checked');
  if (checked.length === 0) return alert("Tick ≥1 error");

  checked.forEach(cb => {
    const name = shortNames[cb.value];
    allErrors.push(`${turn} : Minor error: [${ts}]`);
    allErrors.push(`"${name}"`);
    allErrors.push(`corrected "INCORRECT" as "CORRECT"`);
    allErrors.push('');
  });

  const resultEl = document.getElementById('result');
  resultEl.textContent = allErrors.join('\n').trim();
  document.getElementById('result-container').style.display = 'block';
  resultEl.scrollTop = resultEl.scrollHeight;

  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
}

function resetAll() {
  allErrors = [];
  document.getElementById('result').textContent = '';
  document.getElementById('result-container').style.display = 'none';
  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
  document.getElementById('turnSelect').value = '';
  document.getElementById('timestampInput').value = '';
}

function copyAll() {
  const text = allErrors.join('\n').trim();
  if (!text) return;
  navigator.clipboard.writeText(text).then(() => {
    document.getElementById('toast').classList.add('show');
    setTimeout(() => document.getElementById('toast').classList.remove('show'), 2000);
  }).catch(() => alert('Copy failed'));
}
</script>

<footer>Edge sidebar ready • only checklist text size adjustable</footer>

</body>
</html>
