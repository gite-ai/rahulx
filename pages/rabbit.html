<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>QA Error Checklist - 20 Turns</title>
  <style>
    body {
      font-family: system-ui, sans-serif;
      background: #0d1117;
      color: #c9d1d9;
      padding: 20px 30px;
      max-width: 820px;
      margin: 0 auto;
      line-height: 1.5;
    }
    h1 { color: #58a6ff; text-align: center; margin-bottom: 0.6em; }
    .container {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 24px;
    }
    .top-row {
      display: flex;
      gap: 16px;
      margin-bottom: 20px;
      align-items: center;
      flex-wrap: wrap;
    }
    #turnSelect, #timestampInput {
      padding: 10px;
      background: #0d1117;
      border: 1px solid #30363d;
      color: #c9d1d9;
      border-radius: 6px;
      font-size: 1rem;
    }
    #turnSelect { width: 140px; }
    #timestampInput { flex: 1; min-width: 180px; }
    .error-item {
      margin: 12px 0;
      display: flex;
      align-items: flex-start;
      gap: 12px;
    }
    .error-item input[type="checkbox"] {
      margin-top: 4px;
      width: 18px;
      height: 18px;
      accent-color: #f78166;
    }
    .error-item label { flex: 1; cursor: pointer; }
    .number {
      font-weight: bold;
      color: #79c0ff;
      min-width: 24px;
      display: inline-block;
    }
    .btn-row {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 24px 0;
    }
    button {
      background: #238636;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 1.05rem;
      border-radius: 6px;
      cursor: pointer;
    }
    button:hover { background: #2ea043; }
    button.reset {
      background: #c94d4d;
    }
    button.reset:hover { background: #e06666; }
    #result-container {
      margin-top: 28px;
      position: relative;
      display: none;
    }
    #result {
      padding: 16px;
      background: #0d1117;
      border: 1px solid #30363d;
      border-radius: 6px;
      white-space: pre-wrap;
      font-family: 'Consolas', monospace;
      max-height: 500px;
      overflow-y: auto;
      line-height: 1.6;
      min-height: 180px;
    }
    #copy-all-btn {
      position: absolute;
      bottom: 12px;
      right: 12px;
      background: #444d56;
      color: #e6edf3;
      border: 1px solid #586069;
      padding: 8px 16px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 0.95rem;
    }
    #copy-all-btn:hover { background: #586069; color: white; }
    #toast {
      position: fixed;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      background: #2ea043;
      color: white;
      padding: 12px 28px;
      border-radius: 6px;
      opacity: 0;
      transition: opacity 0.4s;
      z-index: 1000;
      font-weight: 500;
    }
    #toast.show { opacity: 1; }
    footer { text-align: center; margin-top: 40px; color: #8b949e; font-size: 0.9rem; }
  </style>
</head>
<body>

<h1>QA Error Checklist - 20 Turns</h1>

<div class="container">

  <div class="top-row">
    <select id="turnSelect">
      <option value="">Select Turn</option>
      <option value="T1">T1</option><option value="T2">T2</option><option value="T3">T3</option>
      <option value="T4">T4</option><option value="T5">T5</option><option value="T6">T6</option>
      <option value="T7">T7</option><option value="T8">T8</option><option value="T9">T9</option>
      <option value="T10">T10</option><option value="T11">T11</option><option value="T12">T12</option>
      <option value="T13">T13</option><option value="T14">T14</option><option value="T15">T15</option>
      <option value="T16">T16</option><option value="T17">T17</option><option value="T18">T18</option>
      <option value="T19">T19</option><option value="T20">T20</option>
    </select>

    <input type="text" id="timestampInput" placeholder="01:23 or 1m23s (required)" />
  </div>

  <div class="error-item"><input type="checkbox" id="e1" value="1"><label for="e1"><span class="number">1</span> Minor Error – Incorrect Transcription (meaning unchanged)</label></div>
  <div class="error-item"><input type="checkbox" id="e2" value="2"><label for="e2"><span class="number">2</span> Failure to separate multiple speakers properly</label></div>
  <div class="error-item"><input type="checkbox" id="e3" value="3"><label for="e3"><span class="number">3</span> Consecutive [unclear] tags or mistyped tagging</label></div>
  <div class="error-item"><input type="checkbox" id="e4" value="4"><label for="e4"><span class="number">4</span> Punctuation Issues</label></div>
  <div class="error-item"><input type="checkbox" id="e5" value="5"><label for="e5"><span class="number">5</span> Incorrect Language Selection</label></div>
  <div class="error-item"><input type="checkbox" id="e6" value="6"><label for="e6"><span class="number">6</span> Spacing Issues</label></div>
  <div class="error-item"><input type="checkbox" id="e7" value="7"><label for="e7"><span class="number">7</span> Objective Issue with UI Question</label></div>

  <div class="btn-row">
    <button class="main-btn" onclick="addErrorsForTurn()">Add Errors for this Turn</button>
    <button class="reset" onclick="resetAll()">Clear All / Reset</button>
  </div>

  <div id="result-container">
    <button id="copy-all-btn" onclick="copyAll()">Copy All</button>
    <div id="result"></div>
  </div>

</div>

<div id="toast">All errors copied</div>

<script>
const shortNames = {
  '1': 'Minor transcription error (meaning unchanged)',
  '2': 'Multiple speakers not separated properly',
  '3': 'Consecutive/mistyped [unclear] tags',
  '4': 'Punctuation issues',
  '5': 'Incorrect language selection',
  '6': 'Spacing issues',
  '7': 'Objective UI question issue'
};

let allErrors = [];

function addErrorsForTurn() {
  const turn = document.getElementById('turnSelect').value.trim();
  const ts   = document.getElementById('timestampInput').value.trim();

  if (!turn) {
    alert("Please select a turn (T1–T20)");
    return;
  }
  if (!ts) {
    alert("Timestamp is required (example: 01:23)");
    return;
  }

  const checked = Array.from(document.querySelectorAll('input[type="checkbox"]:checked'));
  if (checked.length === 0) {
    alert("Please tick at least one error");
    return;
  }

  console.log(`Adding for ${turn} @ [${ts}] — ${checked.length} errors`);

  checked.forEach(cb => {
    const num = cb.value;
    const name = shortNames[num];
    allErrors.push(`T ${turn} : Minor error: [${ts}]`);
    allErrors.push(`"${name}"`);
    allErrors.push(`corrected "INCORRECT" as "CORRECT"`);
    allErrors.push('');
  });

  const resultEl = document.getElementById('result');
  resultEl.textContent = allErrors.join('\n').trim();
  document.getElementById('result-container').style.display = 'block';

  // Auto-scroll to bottom
  resultEl.scrollTop = resultEl.scrollHeight;

  // Clear checkboxes only (keep turn & timestamp for same-turn multiple adds)
  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
}

function resetAll() {
  allErrors = [];
  document.getElementById('result').textContent = '';
  document.getElementById('result-container').style.display = 'none';
  document.querySelectorAll('input[type="checkbox"]').forEach(el => el.checked = false);
  document.getElementById('turnSelect').value = '';
  document.getElementById('timestampInput').value = '';
}

function copyAll() {
  const text = allErrors.join('\n').trim();
  if (!text) return;

  navigator.clipboard.writeText(text).then(() => {
    const toast = document.getElementById('toast');
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }).catch(err => {
    console.error('Clipboard error:', err);
    alert('Copy failed – please select text manually');
  });
}
</script>

<footer>Timestamp & turn required • Check console (F12) if still not working</footer>

</body>
</html>
